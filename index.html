<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f7d62">
  <meta name="description" content="Eina docent i d'aprenentatge per a Tecnologia Industrial I i II.">
  <title>Tecnologia Industrial Educativa Plus</title>
  <!-- paquet corregit: CSS incrustat i rutes relatives -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/icon-192.png">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <style id="critical-css">
:root{
  --bg:#f4f7f5;
  --card:#ffffff;
  --ink:#1f2a28;
  --muted:#65736f;
  --line:#d8e4de;
  --soft:#e8f2ed;
  --soft2:#edf1f0;
  --primary:#2f7d62;
  --primary-dark:#215b48;
  --blue:#286b96;
  --warn:#936b19;
  --danger:#9b2c2c;
  --radius:18px;
  --shadow:0 8px 24px rgba(23,55,45,.09);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.5;-webkit-text-size-adjust:100%;font-size:16px}
.topbar{position:sticky;top:0;z-index:10;background:rgba(244,247,245,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px clamp(14px,3vw,34px) 10px}
.brand{display:flex;gap:12px;align-items:center;max-width:1180px;margin:0 auto 12px}
.brand-mark{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--primary),#76a88f);display:grid;place-items:center;color:white;font-weight:800;letter-spacing:.04em;box-shadow:var(--shadow)}
.brand h1{font-size:clamp(1rem,4.4vw,1.2rem);margin:0;line-height:1.15}.brand p{margin:.15rem 0 0;color:var(--muted);font-size:.9rem}
.tabs{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.tab{border:1px solid var(--line);background:white;color:var(--ink);border-radius:999px;padding:10px 8px;font-weight:700;cursor:pointer}.tab.active,.tab:hover{background:var(--primary);color:white;border-color:var(--primary)}
main{max-width:1180px;margin:0 auto;padding:22px clamp(14px,3vw,34px) 80px}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;align-items:stretch}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}.card.soft{background:var(--soft)}
h2{font-size:clamp(1.25rem,5.8vw,1.75rem);margin:0 0 10px;line-height:1.15}h3{font-size:clamp(1.05rem,4.6vw,1.25rem);margin:0 0 10px;line-height:1.2}h4{margin:.8rem 0 .4rem}.muted{color:var(--muted)}.small{font-size:.9rem}.grid{display:grid;gap:14px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}.quick{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.btn{border:0;border-radius:12px;background:var(--primary);color:white;padding:11px 14px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px}.btn.secondary{background:var(--blue)}.btn.ghost{background:white;color:var(--primary);border:1px solid var(--line)}.btn.danger{background:var(--danger)}.btn:disabled{opacity:.45;cursor:not-allowed}
.list{padding-left:1.1rem}.pill{display:inline-block;border-radius:999px;background:var(--soft);border:1px solid var(--line);padding:5px 10px;margin:3px;font-size:.88rem}.form-row{display:grid;gap:12px;grid-template-columns:repeat(2,minmax(0,1fr));margin-bottom:12px}label{font-weight:800;font-size:.92rem}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:white;padding:10px 12px;color:var(--ink);font:inherit}textarea{min-height:96px;resize:vertical}.field{display:grid;gap:5px}.help{font-size:.82rem;color:var(--muted)}
.panel{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}.result{background:#f8fbf9;border-left:5px solid var(--primary);padding:14px;border-radius:12px;margin-top:12px;white-space:pre-wrap}.warning{background:#fff8e8;border-left-color:var(--warn)}.error{background:#fff0f0;border-left-color:var(--danger)}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px;background:white}table{width:100%;border-collapse:collapse;min-width:650px}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}th{background:var(--soft);font-weight:900}tr:last-child td{border-bottom:0}.internal-tabs{display:flex;overflow:auto;gap:8px;margin-bottom:12px}.internal-tabs button{white-space:nowrap;border:1px solid var(--line);background:white;border-radius:999px;padding:8px 11px;font-weight:800;cursor:pointer}.internal-tabs button.active{background:var(--primary);border-color:var(--primary);color:white}.rubric-editor .form-row{grid-template-columns:1.1fr 1fr repeat(4,1.2fr)}

.picker-field textarea{min-height:118px}.picker-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.btn.mini{padding:9px 11px;border-radius:10px;white-space:nowrap}.rubric-block{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fbfdfc;margin-bottom:12px}.rubric-block textarea{min-height:44px}.rubric-picker{margin-top:-4px;margin-bottom:2px}.rubric-editor .form-row{grid-template-columns:1.1fr 1.3fr repeat(4,1.1fr)}
.auto-item{display:grid;grid-template-columns:1fr 160px;gap:10px;align-items:center;border-bottom:1px solid var(--line);padding:12px 0}.auto-item:last-child{border-bottom:0}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ink);color:white;border-radius:999px;padding:10px 16px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1}.print-area{display:none}
@media(max-width:820px){.hero,.grid.two,.grid.three,.grid.four,.form-row,.rubric-editor .form-row{grid-template-columns:1fr}.tabs{display:flex;overflow:auto}.tab{min-width:112px}
.picker-field textarea{min-height:118px}.picker-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.btn.mini{padding:9px 11px;border-radius:10px;white-space:nowrap}.rubric-block{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fbfdfc;margin-bottom:12px}.rubric-block textarea{min-height:44px}.rubric-picker{margin-top:-4px;margin-bottom:2px}.rubric-editor .form-row{grid-template-columns:1.1fr 1.3fr repeat(4,1.1fr)}
.auto-item{grid-template-columns:1fr}.brand p{display:none}}
@media print{
  @page{margin:14mm;size:A4}.no-print,.topbar,main,.toast{display:none!important}body{background:white;color:#111;font-family:"Times New Roman",Times,serif;font-size:11.5pt}.print-area{display:block}.print-doc{font-family:"Times New Roman",Times,serif}.print-doc.arial{font-family:Arial,sans-serif}.print-cover{text-align:center;border:1px solid #9eb6a8;padding:28mm 12mm;margin-bottom:12mm}.print-cover h1{font-size:22pt;margin:0 0 10mm}.print-section{break-inside:avoid;margin:0 0 6mm}.print-section h2{font-size:13.5pt;background:#e8f2ed;border:1px solid #bfd3c8;padding:5px 7px;margin:0 0 3mm}.print-section p{margin:0 0 3mm;white-space:pre-wrap}.print-doc table{min-width:0;font-size:9.5pt}.print-doc th,.print-doc td{border:1px solid #b8c7bf;padding:5px}.print-doc th{background:#e8f2ed}.page-break{break-before:page}
}


/* Correccions de desplegament i mòbil */
img,svg{max-width:100%;height:auto}
button,input,select,textarea{max-width:100%}
.card p{overflow-wrap:anywhere}
.quick .btn{min-height:44px}
.pill{white-space:normal;line-height:1.3;margin:4px 4px 4px 0}
@media(max-width:640px){
  .topbar{padding:10px 12px 8px}
  .brand{gap:10px;margin-bottom:10px}
  .brand-mark{width:40px;height:40px;border-radius:12px;font-size:.9rem;flex:0 0 auto}
  .brand h1{font-size:1.05rem}
  .tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{min-width:auto;flex:0 0 auto;padding:9px 12px;border-radius:999px;font-size:.95rem}
  main{padding:14px 12px 72px}
  .card{padding:14px;border-radius:16px;margin-bottom:12px}
  .hero{grid-template-columns:1fr;gap:12px}
  .grid.two,.grid.three,.grid.four,.form-row,.rubric-editor .form-row{grid-template-columns:1fr}
  .quick{gap:8px}
  .quick .btn{flex:1 1 150px;padding:10px 12px;text-align:center}
  .picker-row{grid-template-columns:1fr}
  .btn.mini{width:100%}
  .auto-item{grid-template-columns:1fr}
  .table-wrap{max-width:100%}
  table{min-width:560px}
}
@media(max-width:380px){
  .brand h1{font-size:.98rem}
  .tab{font-size:.9rem;padding:8px 10px}
  .quick .btn{flex-basis:100%}
}

</style>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar no-print">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">TI</div>
      <div>
        <h1>Tecnologia Industrial Educativa Plus</h1>
        <p>PWA educativa · Batxillerat · càlculs, SA, eines i mode docent</p>
      </div>
    </div>
    <nav class="tabs" aria-label="Navegació principal">
      <button class="tab active" data-view="inici">Inici</button>
      <button class="tab" data-view="sa">SA</button>
      <button class="tab" data-view="eines">Eines</button>
      <button class="tab" data-view="docent">Docent</button>
      <button class="tab" data-view="auto">Autoavaluació</button>
    </nav>
  </header>

  <main id="app" tabindex="-1"></main>

  <section id="printArea" class="print-area" aria-hidden="true"></section>

  <div id="toast" class="toast no-print" role="status" aria-live="polite"></div>

  <script src="./app.js" defer></script>
</body>
</html>
